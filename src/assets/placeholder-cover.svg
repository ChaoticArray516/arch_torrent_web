<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Cosmic Ocean themed placeholder -->
  <defs>
    <linearGradient id="cosmicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#010409;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#33BBC5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#33BBC5;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#cosmicGradient)"/>

  <!-- Stars -->
  <g fill="#E6EDF3" opacity="0.8">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="250" cy="120" r="1"/>
    <circle cx="400" cy="60" r="2"/>
    <circle cx="550" cy="150" r="1"/>
    <circle cx="700" cy="90" r="1.5"/>
    <circle cx="150" cy="200" r="1"/>
    <circle cx="300" cy="250" r="1.5"/>
    <circle cx="600" cy="220" r="1"/>
    <circle cx="750" cy="180" r="1.5"/>
    <circle cx="50" cy="300" r="1"/>
    <circle cx="200" cy="350" r="1.5"/>
    <circle cx="450" cy="320" r="1"/>
    <circle cx="650" cy="380" r="2"/>
    <circle cx="800" cy="400" r="1"/>
  </g>

  <!-- Glow effect -->
  <circle cx="400" cy="225" r="150" fill="url(#glow)"/>

  <!-- Code brackets icon -->
  <g transform="translate(400, 225)" fill="none" stroke="#33BBC5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M-60 0 L-80 -20 L-60 -40" transform="translate(0, 20)"/>
    <path d="M60 0 L80 -20 L60 -40" transform="translate(0, 20)"/>
    <line x1="-30" y1="60" x2="30" y2="-20"/>
  </g>

  <!-- Text -->
  <text x="400" y="320" font-family="system-ui, sans-serif" font-size="24" fill="#8B949E" text-anchor="middle" opacity="0.8">
    Project Preview
  </text>
</svg>
